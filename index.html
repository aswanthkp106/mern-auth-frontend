<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Portal</title>
  <style>
    /* Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #f8fafc;
      min-height: 100vh;
    }

    /* Auth Screens Styling (Signup & Login) */
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .portal-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .portal-subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 30px;
    }

    .input-field-group {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modern-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .modern-input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .action-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .redirect-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .accent-link {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }

    .accent-link:hover {
      text-decoration: underline;
    }

    /* Dashboard Layout Styling */
    .dash-nav {
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dash-brand {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(to right, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logout-nav-btn {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .logout-nav-btn:hover {
      background: #ef4444;
      color: white;
    }

    .dash-main-grid {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }

    @media (min-width: 768px) {
      .dash-main-grid {
        grid-template-columns: 1fr 2fr;
      }
    }

    .dash-card {
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px;
    }

    .profile-panel {
      text-align: center;
    }

    /* Profile Circle Configurations */
    .avatar-wrapper {
      width: 140px;
      height: 140px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(to bottom, #a855f7, #06b6d4);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-img-element {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #1e293b;
    }

    .dash-user-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .dash-user-email {
      color: #94a3b8;
      font-size: 0.9rem;
      font-family: monospace;
    }

    .settings-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 25px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: #f1f5f9;
    }

    .control-row-item {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .inline-input-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .inline-input-group .modern-input {
      flex: 1;
    }

    .row-action-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0 22px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .row-action-btn:hover {
      background: #2563eb;
    }

    .danger-section {
      margin-top: 35px;
      border-top: 1px dashed rgba(239, 68, 68, 0.3);
      padding-top: 25px;
    }

    .danger-alert-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .danger-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
